<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Live Radar Map</title>
  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>
  <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/dark/main.css">
  <script src="https://js.arcgis.com/4.28/"></script>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/WebTileLayer"
    ], function(Map, MapView, WebTileLayer) {

      const map = new Map({
        basemap: "dark-gray-vector" // Dark basemaps show radar well
      });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-98, 38], // Center over the US (adjust as needed)
        zoom: 4
      });

      let radarLayer = null;

      // Function to fetch and update the radar layer
      async function updateRadar() {
        try {
          // Fetch the RainViewer API endpoint
          const response = await fetch("https://api.rainviewer.com/public/weather-maps.json");
          const data = await response.json();

          // Get the latest path from past radar frames
          const pastFrames = data.radar.past;
          const latestFrame = pastFrames[pastFrames.length - 1];
          const latestPath = latestFrame.path;

          // Construct the dynamic URL template
          // RainViewer format: {host}{path}/256/{z}/{x}/{y}/2/1_1.png
          const urlTemplate = `${data.host}${latestPath}/256/{level}/{col}/{row}/2/1_1.png`;

          // If a radar layer already exists, remove it before adding the new one
          if (radarLayer) {
            map.remove(radarLayer);
          }

          // Add the updated tile layer
          radarLayer = new WebTileLayer({
            urlTemplate: urlTemplate,
            opacity: 0.7
          });
          
          map.add(radarLayer);
          console.log(`Radar updated for timestamp: ${new Date(latestFrame.time * 1000).toLocaleTimeString()}`);

        } catch (error) {
          console.error("Failed to load RainViewer data:", error);
        }
      }

      // 1. Initial load
      updateRadar();

      // 2. Refresh every 10 minutes (600,000 milliseconds)
      setInterval(updateRadar, 600000); 
    });
  </script>
</head>
<body>
  <div id="viewDiv"></div>
</body>
</html>
